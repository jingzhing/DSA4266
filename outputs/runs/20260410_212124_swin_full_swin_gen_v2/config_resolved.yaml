project:
  name: DSA4266-ai-image-detection
  seed: 17
paths:
  data_root: data
  raw_root: data/raw
  prepared_root: data/prepared
  outputs_root: outputs/runs
data:
  dataset_id: ayushmandatta1/deepdetect-2025
  dataset_version: deepdetect-2025
  raw_train_subdir: ddata/train
  raw_test_subdir: ddata/test
  class_names:
  - real
  - fake
  skip_download: true
  additional_train_roots: []
  additional_class_dirs:
    real: []
    fake: []
audit:
  decode_failed_rate_threshold: 0.005
video:
  enabled: false
  urls: []
  output_subdir: video_frames
  blur_threshold: 7.0
  min_frame_stride: 100
  max_frame_stride: 600
  seed: 42
  cleanup_video_file: true
prepare:
  val_ratio: 0.1
  validation_protocol: source_aware
  overwrite: false
  copy_test_from_raw: true
  augmentation:
    enabled: true
    target_class: fake
    max_multiplier: 1.25
    probabilities:
      hflip: 0.5
      vflip: 0.1
      gaussian_blur: 0.25
      random_erase: 0.2
      rotate: 0.2
      brightness_contrast: 0.3
      gaussian_noise: 0.15
      jpeg_compression: 0.15
    erase_area_range:
    - 0.05
    - 0.2
    blur_kernel: 5
    blur_sigma_min: 0.3
    blur_sigma_max: 1.5
    rotate_degrees: 12.0
    brightness_limit: 0.15
    contrast_limit: 0.2
    noise_sigma_min: 3.0
    noise_sigma_max: 12.0
    jpeg_quality_min: 45
    jpeg_quality_max: 95
models:
  swin:
    model_name: swin_tiny_patch4_window7_224
    img_size: 224
    batch_size: 16
    epochs: 8
    lr: 0.0001
    num_workers: 12
  efficientnet:
    variant: B0
    img_size: 224
    batch_size: 16
    epochs: 5
    lr: 0.0001
    freeze_backbone: true
    dropout: 0.3
training:
  threshold_metric: balanced_acc
  default_threshold: 0.5
  runtime_augmentation: false
  advanced:
    selection:
      enabled: true
      min_fake_recall: 0.95
    hard_negative_mining:
      enabled: true
      top_k: 4000
      real_weight_multiplier: 4.0
      min_epoch_to_start: 2
      update_every_epochs: 1
    robust_augmentation:
      enabled: true
    calibration:
      enabled: true
      max_steps: 250
      lr: 0.03
    evaluation:
      prefer_checkpoint_threshold: false
  optimization:
    dataloader:
      pin_memory: false
      persistent_workers: true
      prefetch_factor: 4
    swin:
      gradient_accumulation_steps: 2
      max_grad_norm: 1.0
      weight_decay: 0.01
      scheduler: cosine
      warmup_epochs: 1
      min_lr: 1.0e-06
      early_stopping_patience: 2
      early_stopping_min_delta: 0.0
      amp: false
      num_threads: 16
    efficientnet:
      early_stopping_patience: 1
      early_stopping_min_delta: 0.0
      reduce_lr_patience: 1
      reduce_lr_factor: 0.5
      min_lr: 1.0e-06
evaluation:
  save_confusion_matrix: true
inference:
  default_input: data/prepared/deepdetect-2025/test
artifacts:
  tag: full_swin_gen_v2
  overwrite: false
_meta:
  config_path: /home/ubuntu/work/DSA4266/.ablation_configs/batch_20260410_151834_a6_source_aware_seed17.yaml
  repo_root: /home/ubuntu/work/DSA4266
